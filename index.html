<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruang Bermain — Direktorat SMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFFFFF;--ink:#13233F;--ink-soft:#54667A;--ink-faint:#8A99AD;
    --line:#E6ECF4;
    --blue-900:#0B3C8C;--blue-700:#0D47A1;--blue-600:#1565C0;--blue-500:#1976D2;--blue-400:#2196F3;
    --radius:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--ink);height:100vh;height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased;line-height:1.5;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(20px,3.5vh,40px);padding:clamp(20px,4vh,44px) clamp(18px,4vw,40px);
    background:radial-gradient(1000px 600px at 80% -10%, var(--blue-400) 0%, transparent 55%),linear-gradient(135deg,var(--blue-600),var(--blue-900));position:relative}
  body::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 14% 84%, rgba(255,255,255,.07), transparent 42%);pointer-events:none}
  a{text-decoration:none;color:inherit}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  svg{display:block}
  img{display:block}

  /* HERO */
  .hero{text-align:center;position:relative;z-index:1}
  .hero-logo{width:200px;height:88px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center}
  .hero-logo img{width:100%;height:100%;object-fit:contain}
  .hero-logo.noimg{border:1.5px dashed rgba(255,255,255,.5);background:rgba(255,255,255,.1);color:rgba(255,255,255,.9)}
  .hero-logo.noimg::after{content:"LOGO";font-size:12px;font-weight:800;letter-spacing:.12em}
  .hero h1{font-size:clamp(26px,4.4vw,40px);font-weight:800;letter-spacing:-.03em;line-height:1.1;color:#fff}
  .hero p{font-size:clamp(13.5px,1.8vw,16px);color:rgba(255,255,255,.78);font-weight:500;margin-top:10px}
  .hero p b{color:#fff;font-weight:700}

  /* GRID */
  .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:clamp(16px,1.8vw,24px);width:100%;max-width:1040px;position:relative;z-index:1}
  .game{--aksen:var(--blue-600);--aksen-soft:#eef3fb;background:var(--paper);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 56px -34px rgba(4,18,52,.8);transition:transform .22s cubic-bezier(.4,0,.2,1),box-shadow .22s ease}
  a.game:hover{transform:translateY(-6px);box-shadow:0 44px 70px -34px rgba(4,18,52,.9)}
  .cover{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--aksen-soft)}
  .cover img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
  a.game:hover .cover img{transform:scale(1.05)}
  .cover.noimg{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--aksen),color-mix(in srgb,var(--aksen) 58%,#000))}
  .cover.noimg::after{content:attr(data-label);color:rgba(255,255,255,.92);font-size:12px;font-weight:800;letter-spacing:.14em}
  .cover .badge{position:absolute;top:13px;left:13px;display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.96);color:var(--aksen);font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
  .cover .badge.soon{background:rgba(19,35,63,.82);color:#fff}
  .body{padding:clamp(16px,1.6vw,20px);display:flex;flex-direction:column;flex:1}
  .game h3{font-size:clamp(17px,1.7vw,20px);font-weight:800;letter-spacing:-.02em}
  .game .desc{font-size:13px;color:var(--ink-soft);font-weight:500;margin-top:7px;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .meta{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:9px;background:var(--aksen-soft);color:var(--aksen);font-size:11.5px;font-weight:700}
  .chip svg{width:13px;height:13px}
  .play{margin-top:15px;width:100%;padding:13px;border-radius:12px;background:var(--aksen);color:#fff;font-size:14.5px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 14px 26px -14px var(--aksen);transition:filter .15s ease}
  a.game:hover .play{filter:brightness(1.08)}
  .game.segera{opacity:.96}
  .game.segera .cover{filter:saturate(.6)}
  .game.segera .play{background:#E8EDF4;color:var(--ink-faint);box-shadow:none;cursor:default}

  @media (max-width:760px){
    body{overflow:auto;justify-content:flex-start}
    .grid{grid-template-columns:1fr;max-width:420px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<section class="hero">
  <h1>Konten Interaktif Digital</h1>
  <p>Tim Kerja Pembelajaran dan Penilaian</p>
</section>

<main class="grid" id="grid"></main>

<script>
/* =====================================================================
   DAFTAR PERMAINAN  —  tambah / ubah game di sini
   - cover  : file gambar cover (rasio 16:9). Kosongkan "" untuk placeholder.
   - file   : file HTML game yang dibuka saat diklik
   - aksen  : warna tema kartu (badge, chip, tombol)
   - segera : true = kartu "Segera Hadir" (belum bisa diklik)
   ===================================================================== */
const GAMES = [
  {
    judul: "Berani Coba TKA?",
    kategori: "Kuis",
    deskripsi: "Simulasi Tes Kemampuan Akademik dengan soal pilihan ganda yang diacak tiap sesi.",
    cover: "cover-cobatka.png",
    file:  "https://kurikulumsma.github.io/gamedibelai/host-coba-tka.html",
    aksen: "#1565C0",
    meta: [
      { ikon: "clock", teks: "30 detik / soal" },
      { ikon: "list",  teks: "Pilihan ganda" },
    ],
  },
  {
    judul: "Cari Jodoh!",
    kategori: "Memori",
    deskripsi: "Cocokkan tiap gambar dengan penjelasannya secepat mungkin sebelum waktu habis.",
    cover: "cover-carijodoh.png",
    file:  "https://kurikulumsma.github.io/gamedibelai/host-cari-jodoh.html",
    aksen: "#0E7C66",
    meta: [
      { ikon: "clock", teks: "60 detik" },
      { ikon: "cards", teks: "6 pasang" },
    ],
  },
  {
    judul: "Kuis Dibelai",
    kategori: "Kuis",
    deskripsi: "Uji seberapa kenal kamu dengan Tim Kerja Pembelajaran dan Penilaian lewat soal-soal seru seputar Dibelai.",
    cover: "cover-kuisdibelai.png",
    file:  "https://kurikulumsma.github.io/gamedibelai/host-kuis-dibelai.html",
    aksen: "#D98214",
    meta: [
      { ikon: "clock", teks: "30 detik / soal" },
      { ikon: "list",  teks: "Pilihan ganda" },
    ],
  },
];
/* ===================================================================== */

const IKON = {
  clock:'<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 8v4l2.5 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  list:'<svg viewBox="0 0 24 24" fill="none"><path d="M8 6h12M8 12h12M8 18h12M3.5 6h.01M3.5 12h.01M3.5 18h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
  cards:'<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="11" height="14" rx="2" stroke="currentColor" stroke-width="2"/><path d="M9 5V4a1 1 0 0 1 1.3-.95l9 2.9A1 1 0 0 1 20 7l-3 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
};
const IC_PLAY='<svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M7 5l12 7-12 7V5Z" fill="currentColor"/></svg>';
const IC_SOON='<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 8v4l2.5 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';

const grid = document.getElementById("grid");
GAMES.forEach(g=>{
  const el=document.createElement(g.segera ? "div" : "a");
  el.className="game"+(g.segera?" segera":"");
  if(!g.segera) el.href=g.file;
  el.style.setProperty("--aksen", g.aksen);
  el.style.setProperty("--aksen-soft", `color-mix(in srgb, ${g.aksen} 11%, #fff)`);
  const chips=g.meta.map(m=>`<span class="chip">${IKON[m.ikon]||""}${m.teks}</span>`).join("");
  const cover = g.cover
    ? `<img src="${g.cover}" alt="${g.judul}" onerror="this.remove();this.parentElement.classList.add('noimg');this.parentElement.dataset.label='COVER'">`
    : "";
  el.innerHTML=`
    <div class="cover${g.cover?'':' noimg'}" data-label="COVER">
      ${cover}
      <span class="badge${g.segera?' soon':''}">${g.kategori}</span>
    </div>
    <div class="body">
      <h3>${g.judul}</h3>
      <p class="desc">${g.deskripsi}</p>
      <div class="meta">${chips}</div>
      <span class="play">${g.segera?IC_SOON+' Segera Hadir':IC_PLAY+' Mainkan'}</span>
    </div>`;
  grid.appendChild(el);
});
</script>
</body>
</html>
